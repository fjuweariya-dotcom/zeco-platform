services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zeco-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - zeco-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: zeco-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://zeco-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - zeco-network

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: zeco-kafdrop
    depends_on:
      - kafka
    ports:
      - "9002:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - zeco-network

  spark-master:
    image: apache/spark:3.5.3
    container_name: zeco-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - zeco-network

  spark-worker:
    image: apache/spark:3.5.3
    container_name: zeco-spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
    networks:
      - zeco-network

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.3
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=bigdata
      - SPARK_MASTER=spark://spark-master:7077
    networks:
      - zeco-network

  minio:
    image: minio/minio:latest
    container_name: zeco-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - zeco-network

  postgres:
    image: postgres:15
    container_name: zeco-postgres
    environment:
      POSTGRES_DB: zeco_metadata
      POSTGRES_USER: zeco_user
      POSTGRES_PASSWORD: zeco_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zeco-network

  redis:
    image: redis:7-alpine
    container_name: zeco-redis
    ports:
      - "6379:6379"
    networks:
      - zeco-network

  prometheus:
    image: prom/prometheus:latest
    container_name: zeco-prometheus
    ports:
      - "9090:9090"
    networks:
      - zeco-network

  grafana:
    image: grafana/grafana:latest
    container_name: zeco-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - zeco-network

  airflow:
    image: apache/airflow:2.9.3
    container_name: zeco-airflow
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://zeco_user:zeco_pass@postgres:5432/zeco_metadata
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: zeco_airflow_secret_key
      PYTHONPATH: /opt/airflow/zeco-platform
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/zeco-platform
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8085:8080"
    command: >
      bash -c " airflow db migrate && airflow connections create-default-connections && airflow users create --username admin --password admin --firstname ZECO --lastname Admin --role Admin --email admin@zeco.local || true && airflow webserver -p 8080 & airflow scheduler "
    networks:
      - zeco-network

networks:
  zeco-network:
    driver: bridge

volumes:
  kafka_data:
  minio_data:
  postgres_data:
  airflow_logs:
